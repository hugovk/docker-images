
name: Docker images

on: [push, pull_request, workflow_dispatch]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: ${{ matrix.image }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest"]
        image:
          - "ubuntu-26.04-plucky-s390x"
        include:
          - image: "ubuntu-26.04-plucky-s390x"
            qemu-arch: "s390x"
            docker-args: "--platform linux/s390x"

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: true

      - name: Set up QEMU
        if: "matrix.qemu-arch"
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
        with:
          platforms: ${{ matrix.qemu-arch }}

      - name: Prepare build
        run: |
          sudo apt-get update && sudo apt-get install -qyy debootstrap
          if [[ -n "$matrix.test-image" ]]; then
            git submodule update --remote --init --recursive Pillow
          else
            git submodule update --remote Pillow
          fi
          (cd Pillow && git checkout main)
          sudo chown -R 1001 "$(pwd)"

      - name: Build image
        id: build
        run: |
          cd "${{ matrix.image }}" && sudo chmod a+w . && make update
          if [[ -n "$DOCKER_USERNAME" ]]; then
            echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin && echo "logged_in=true" >> "$GITHUB_OUTPUT"
          fi
          make build BRANCH=main
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          DOCKER_ARGS: ${{ matrix.docker-args }}

      - name: Test image
        run: |
          cd "${{ matrix.image }}"
          docker run --rm -v ${{ github.workspace }}/Pillow:/Pillow ubuntu-26.04-plucky-s390x:main bash -c '
            source /vpy3/bin/activate
            cd /Pillow
            make clean
            make install-coverage

            echo "=== runtime webp version ==="
            python3 -c "from PIL import features; print(features.version(\"webp\"))"

            echo "=== ldd _webp.so ==="
            find /vpy3 -name "_webp*" -exec ldd {} \;

            echo "=== libwebp files ==="
            ls -la /usr/lib/libwebp* /usr/lib/s390x-linux-gnu/libwebp* 2>/dev/null

            echo "=== running test ==="
            python -m pytest Tests/test_file_webp_animated.py -xvs
          '

      - name: Log image size
        run: |
          docker images

      - name: Push image
        if: "steps.build.outputs.logged_in == 'true'
                           && github.event_name == 'push'
                           && github.ref == 'refs/heads/main'"
        run: make push-${{ matrix.image }} BRANCH=main
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}

      - name: Post build
        if: always()
        run: sudo chown -R "$(id -u)" "$(pwd)"

  success:
    needs: build
    runs-on: ubuntu-latest
    name: Build successful
    steps:
      - name: Success
        run: echo Build Successful
